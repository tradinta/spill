services:
  # Python Backend (Flask + Playwright)
  - type: web
    name: osint-api
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 10000

  # React Frontend (Static Site)
  - type: static
    name: osint-frontend
    runtime: static
    rootDir: osint-web
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: osint-api
          type: web
          property: host
